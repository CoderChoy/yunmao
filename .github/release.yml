changelog:
  exclude:
    labels:
      - skip-changelog
      - duplicate
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - migration
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
        - regression
    - title: Maintenance
      labels:
        - chore
        - docs
        - refactor
    - title: Other Changes
      labels:
        - "*"
